<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foundy — 寵物協尋</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .font-serif-display { font-family: 'DM Serif Display', serif; }
    .noise-bg {
      background-color: #1a1a18;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up   { animation: fadeUp 0.5s ease both; }
    .fade-up-1 { animation-delay: 0.05s; }
    .pet-card  { transition: transform 0.25s ease, box-shadow 0.25s ease; }
    .pet-card:hover { transform: translateY(-4px); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c8a96e44; border-radius: 9px; }

    /* Modal 動畫 */
    .modal-enter-active, .modal-leave-active { transition: opacity 0.25s ease; }
    .modal-enter-from,   .modal-leave-to     { opacity: 0; }
    .modal-enter-active .modal-panel { transition: transform 0.3s ease; }
    .modal-enter-from   .modal-panel { transform: translateY(40px); }

    /* 篩選抽屜 */
    .sheet-enter-active, .sheet-leave-active { transition: opacity 0.2s ease; }
    .sheet-enter-from,   .sheet-leave-to     { opacity: 0; }

    /* Leaflet 深色主題 */
    .leaflet-container { background: #1a1a18; }
    .leaflet-tile { filter: brightness(0.85) saturate(0.7); }
    .leaflet-tooltip {
      background: #222220; border: 1px solid #c8a96e33;
      color: #e8e0d0; font-size: 11px; padding: 3px 8px; border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .leaflet-tooltip-left::before, .leaflet-tooltip-right::before { border: none; }
    .leaflet-control-attribution { background: #1a1a18bb !important; color: #5a5650 !important; font-size: 9px; }
    .leaflet-control-attribution a { color: #9a9080 !important; }
  </style>
</head>
<body class="noise-bg min-h-screen text-[#e8e0d0]">
  <div id="app"></div>
  <script type="module" src="./app.js"></script>
</body>
</html>
